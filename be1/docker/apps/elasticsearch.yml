services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "${ELASTICSEARCH_BIND_ADDRESS:-127.0.0.1}:${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    cpus: "${ELASTICSEARCH_CPUS:-1.0}"
    mem_limit: ${ELASTICSEARCH_MEMORY_LIMIT:-2g}
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:9200/_cluster/health >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 1m

volumes:
  elasticsearch_data:
    driver: local
