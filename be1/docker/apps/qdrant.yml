services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    # Auth TẮT (dev): KHÔNG set QDRANT__SERVICE__API_KEY. Lưu ý set biến này = "" vẫn bị Qdrant
    # coi là "bật auth với key rỗng" -> 401. Bật auth: bỏ comment dòng dưới + set QDRANT_API_KEY
    # ở docker/.env.docker và .env của app cho khớp.
    # environment:
    #   QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "${QDRANT_BIND_ADDRESS:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_BIND_ADDRESS:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    cpus: "${QDRANT_CPUS:-1.0}"
    mem_limit: ${QDRANT_MEMORY_LIMIT:-1g}
    # Image Qdrant không có shell/curl -> không dùng healthcheck exec kiểu ES/Postgres;
    # app tự fallback lexical nếu Qdrant chưa sẵn sàng.
    stop_grace_period: 30s

volumes:
  qdrant_data:
    driver: local
