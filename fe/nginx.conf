# DMX Advisor — serves the React SPA and proxies API paths to the backend.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream backend {
  server backend:8100;
}

# ---- HTTP: redirect everything to HTTPS ----
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# ---- HTTPS: serve the SPA and proxy API paths ----
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  # Self-signed cert (bare IP, no domain). Mounted read-only from deploy/certs.
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  # ---- API + SSE proxy ----
  # /chat streams Server-Sent Events, so buffering must stay off and timeouts long.
  location ~ ^/(auth|chat|catalog|health) {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # SSE / long-lived streaming
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # ---- SPA fallback ----
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (hashed filenames from Vite)
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
